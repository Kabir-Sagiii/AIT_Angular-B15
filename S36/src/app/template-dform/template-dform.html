<div class="signin-container">
  <h2>Sign In</h2>
  <form #login="ngForm" class="signin-form" (ngSubmit)="getData(#login)">
    <div class="form-group">
      <label for="email">Email</label>
      <input ngModel #email="ngModel" type="email" id="email" name="email" required />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input ngModel #password="ngModel" type="password" id="password" name="password" required />
    </div>
    <button type="submit" class="signin-btn">Sign In</button>
  </form>
  <p class="signup-link">Don't have an account? <a href="#">Sign Up</a></p>
</div>
