<section class="password-card">
  <h2>Change Password</h2>
  <div class="input-row">
    <label>Current Password</label>
    <input type="password" placeholder="Enter current password" readonly />
  </div>
  <div class="input-row">
    <label>New Password</label>
    <input type="password" placeholder="Enter new password" readonly />
  </div>
  <div class="input-row">
    <label>Confirm Password</label>
    <input type="password" placeholder="Confirm new password" readonly />
  </div>
  <button>Update Password</button>
  <div class="hint">
    Tip: Use at least 8 characters with letters and numbers for stronger security.
  </div>
</section>
